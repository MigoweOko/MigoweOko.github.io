<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Source+Code+Pro&family=Varela+Round&display=swap" rel="stylesheet"> 
	<link rel="stylesheet" href="/styles/style.css">
	<title>MigoweOko</title>
</head>
<body class="theme-dark">
	<div class="container">
		<div class="header">
			<div class="menubar">
				<div class="hamburger">
					<div class="bar top"></div>
					<div class="bar mid"></div>
					<div class="bar bot"></div>
				</div>
			</div>
			<div class="titlebar">
				<p>MigoweOko</p>
			</div>
		</div>
		<div class="content">
			<button class="theme-changer">
				Toggle Theme!
			</button>
		</div>
		<div class="footer">
			<p>Baby don't hurt me, don't hurt me, no more</p>
		</div>
	</div>

	<script>
		let theme_changer = document.querySelector(".theme-changer");
		const body = document.body;
		let theme = window.localStorage.getItem("theme");
		if (theme) {
			if (theme == "light") {
				body.classList.add("theme-light");
				body.classList.remove("theme-dark");
			}
		} else {
			window.localStorage.setItem("theme", "dark");
		}

		theme_changer.addEventListener("click", (ev) => {
			theme = window.localStorage.getItem("theme");
			if (theme == "dark" ) {
				body.classList.add("theme-light");
				body.classList.remove("theme-dark");
				window.localStorage.setItem("theme", "light");
			} else {
				body.classList.add("theme-dark");
				body.classList.remove("theme-light");
				window.localStorage.setItem("theme", "dark");
			}
		});
	</script>
</body>
</html>
